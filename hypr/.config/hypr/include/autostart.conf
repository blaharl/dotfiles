exec-once = systemctl start --user polkit-gnome-authentication-agent-1 
exec-once = mpd
exec-once = mpDris2
exec-once = pypr
# exec-once = ibus-daemon -drx
exec-once = fcitx5 -d -r
exec-once = dms run
